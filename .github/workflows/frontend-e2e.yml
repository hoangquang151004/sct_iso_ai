name: Frontend E2E

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sct_iso_ai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sct_iso_ai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: frontend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/sct_iso_ai_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/sct_iso_ai_test
      JWT_SECRET_KEY: ci-test-secret-key
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Seed RBAC defaults
        working-directory: backend
        run: python -c "from modules.auth.bootstrap import seed_rbac_defaults; seed_rbac_defaults()"

      - name: Start backend
        working-directory: backend
        run: uvicorn main:app --host 127.0.0.1 --port 8000 &

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test

      - name: Run e2e tests
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
